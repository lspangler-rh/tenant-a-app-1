apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-1
  labels:
    app: app-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-1
  template:
    metadata:
      labels:
        app: app-1
    spec:
      containers:
      - name: app-1
        image: docker.io/openshift/hello-openshift:v3.9.0
        ports:
        - containerPort: 8080
        env:
        - name: RESPONSE
          value: "Hello Openshift!"
